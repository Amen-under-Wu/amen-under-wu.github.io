<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>敬请期待</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style/bpk.css">
    <link rel="stylesheet" href="/style/w3.css">
    <link rel="stylesheet" href="/style/font-awesome.min.css">
</head>
<body>

<div class="main-content">
    <div class="w3-container w3-content w3-center w3-padding-32" style="max-width:800px" id="ll">
        <h2 class="w3-wide">敬请期待</h2>
        <br>
        <br>
        <h4 class="w3-opacity w3-wide" id="slogan"></h4>
    </div>
</div>
<script>
    let slogans = [
        "多快好省地建设小站",
        "安全高于一切 责任重于泰山",
        "发扬拼搏精神 创建一流工程",
        "生产必须安全 安全促进生产",
        "鼓足干劲，力争上游"
    ];
    function chooseSlogan() {
        let randnum = Math.floor(Math.random() * slogans.length);
        document.getElementById("slogan").innerHTML = slogans[randnum];
    }
    window.onload = chooseSlogan;
</script>
<script src="/main.js"></script>
</body>
</html>
