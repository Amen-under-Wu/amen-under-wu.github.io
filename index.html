<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Amen-under-Wu个人网页</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: "Lato", sans-serif
        }

        .mySlides {
            display: none
        }

        #coverTxt2 {
            font-style: italic
        }
    </style>
</head>
<body>
<div id="main-content">
    <div class="w3-display-container w3-center">
        <h4 id="coverTxt1"></h4>
        <img class="w3-round" id="coverPic" onclick="window.location.reload();" alt="cover-picture" width="300px" src="#">
        <p id="coverTxt2"></p>
    </div>
</div>
<script src="/main.js"></script>
<script>
    useTemplate("biupiukiu");
    window.onload = chooseCover;
    let coverTxt = [
        "不能究物理 2025.6.-看那颗头，像块起褶儿的幽灵",
        "京城景 2025.3.-从舷窗往外看，船在北平湾靠岸",
        "北平今考 2024.4.-国贸桥金色的塔吊",
        "京城景 2024.4.-生来不怕碰钉子，碰了一根化一根",
        "像素画 2023.1.-未来心不可得",
        "京城景 2024.12.-月坛接收月相调制的月光信号",
        "星期二的仪式 2025.9.-周二下午，和此后的每一个周二下午",
        "北平今考 2025.8.-玉渊潭，嘶吼的太阳从天而降",
        "星期二的仪式 2025.9.-周一早上起猛了",
        "一种生活 2020.5.-防治城市牛皮癣，大力不倡导非法涂鸦",
        "一种生活 2025.7.-等天亮，鬼就不哭了",
        "像素画 2022.12.-火焰的种子，在夜晚",
        "一种生活 2025.9.-比猫头鹰更好的止疼药",
        "北平今考 2025.9.-箭亭桥头，云垂海立的塔吊",
    ];

    let randomNum = Math.floor((Math.random() * coverTxt.length));
    let chosenTxt = coverTxt[randomNum];
    const tempArray = chosenTxt.split("-");

    function chooseCover() {
        document.getElementById("coverPic").src = "cover/" + randomNum + ".jpg";
        document.getElementById("coverTxt1").innerHTML = tempArray[0];
        document.getElementById("coverTxt2").innerHTML = tempArray[1];
    }
</script>
</body>
</html>
